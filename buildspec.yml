version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - cd flask-elastic-app/app
      - pip install -r requirements.txt

  build:
    commands:
      - echo Running syntax check...
      - python -m py_compile app.py
      - echo Build completed successfully

artifacts:
  files:
    - '**/*'
